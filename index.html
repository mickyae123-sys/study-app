<!DOCTYPE html>
<html>
<head>
    <title>Advanced Calculus Study Guide</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        nav { background: #222; padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; border-bottom: 2px solid #333; }
        nav a { color: #aaa; margin: 5px 10px; text-decoration: none; font-size: 13px; cursor: pointer; transition: 0.2s; border: 1px solid #444; padding: 4px 8px; border-radius: 4px; }
        nav a:hover { color: white; background: #444; border-color: #666; }
        iframe { border: none; flex-grow: 1; width: 100vw; background: #000; }
    </style>
</head>
<body>

<nav id="gameNav">
    <a onclick="loadGame('https://play.famobi.com/moto-x3m-pool-party')">Ch 1: Limits (MotoX)</a>
    <a onclick="loadGame('https://unblocked-games.s3.amazonaws.com/monkey-mart/index.html')">Ch 2: Derivatives (MonkeyMart)</a>
    <a onclick="loadGame('https://webglmath.github.io/slope/')">Ch 3: Integrals (Slope)</a>
    <a onclick="loadGame('https://play.famobi.com/western-sniper')">Ch 4: Geometry (Sniper)</a>
    <a onclick="loadGame('https://geometrydash.io/game/geometry-dash-lite/')">Ch 5: Series (GDash)</a>
    <a onclick="loadGame('https://vancouver-games.github.io/bitlife/')">Ch 6: Probability (BitLife)</a>
    <a onclick="loadGame('https://subway-surfers.org/game/')">Ch 7: Vectors (SubwaySurf)</a>
    <a onclick="loadGame('https://3kh0-hel.github.io/projects/tunnel-rush/index.html')">Ch 8: Functions (TunnelRush)</a>
    <a onclick="loadGame('https://3kh0.github.io/projects/totm/index.html')">Ch 9: Logarithms (TOTM)</a>
    <a onclick="loadGame('https://3kh0.github.io/projects/cookie-clicker/index.html')">Ch 10: Sequences (Cookie)</a>
</nav>

<iframe id="gameFrame" src="https://play.famobi.com/moto-x3m-pool-party"></iframe>

<script>
    function loadGame(url) {
        document.getElementById('gameFrame').src = url;
    }
</script>

</body>
</html>
